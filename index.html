<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drucken</title>
    
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/panel-switch.css">
</head>
<body>
    <section class="main-section">
        <div class="nav-top-logo">
            <div class="brand-logo">
                <a href="https://hoppe.parts/">
                    <img src="media/logo_300x42.webp" style="object-fit: cover; width: 100%; height: 100%;" alt="">
                </a>
            </div>
        </div>
        <div class="background-main-section">
            <div class="image">    
                <img src="media/85126822_193643055372251_207363735470211072_n.jpg" loading="eager" class="main-image" alt="">
                <div class="dark-overlay"></div>
            </div>
        </div>

        <div class="panel-content">
            
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <h3>
                            <strong>
                               ~ Barcode Generierung ~
                            </strong>
                        </h3>
                    </div>
                </div>
                <div class="form-group">
                    <form id="submitForm">
                        <div class="form-container">
                            <div class="form-container-inputs">
                                
                                <div class="first-category-of-inputs">
                                    <div class="field-input artikel-input">
                                        <div class="text"><label for="inputArtikel" ><strong>
                                            <em style="font-size: 20px;">Artikelnummer</em> 
                                        </strong><span style="color: red;">*</span></label></div>
                                        <input type="text" id="inputArtikel" class="inputText inputNumber" name="Artikelnummer" autocomplete="off" placeholder="z.B 5600 0001 1000" required>
                                    </div>
                                    <div class="field-input sn-input">
                                        <div class="text"><label for="inputSN"><strong>
                                            <em style="font-size: 20px;">SN Nummer</em> 
                                        </strong><span style="color: red;">*</span></label></div>
                                        <input type="text" id="inputSN" class="inputText sn-value" name="SNnummer" autocomplete="off" placeholder="z.B SN223355" required>
                                    </div>

                                </div>

                                <div class="secondary-category-of-inputs">
                                    <div class="field-input namen-input">
                                        <div class="text"><label for="inputArtikel" ><strong>
                                            <em style="font-size: 20px;">Produkt Namen</em> 
                                        </strong><span style="color: red;">*</span></label></div>
                                        <input type="text" class="inputText inputNamen" name="Artikelnummer" autocomplete="off" placeholder="z.B Hydrauliktank VAT-Alu 510x620x670mm-190L" required>
                                    </div>
                                    <div class="field-input menge-input" style="width: 100px;">
                                        <div class="text"><label for="inputMenge" ><strong>
                                            <em style="font-size: 20px;">Menge</em> 
                                        </strong><span style="color: red;">*</span></label></div>
                                        <input type="number" class="inputText" id="inputMenge" class="form-control" min="1" name="menge" max="300" value="1" step="1">
                                    </div>
                                </div>
                                
                            </div>
                            
                            <div class="buttons">
                                <div class="container">
                                    <div class="abrechen-btn btn-box">
                                        <button type="reset" id="reset" class="btn danger">Zurücksetzen</button>
                                    </div>
                                    <div class="bestätigen-btn btn-box">
                                        <button type="submit" id="confirm" class="btn success">Bestätigen</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>

                </div>
                

                <div class="container-brands">
                    <div class="brands">
                        <div class="hoppe brand">
                            <a href="https://hoppe.parts/">
                                <img src="media/logo_300x42.webp" loading="lazy" style="width: 150px;" alt="Brand">
                            </a>
                        </div>
                        <div class="hofmeister brand">
                            <a href="https://www.hofmei.de/">
                                <img src="media/hofmei-large.svg" loading="lazy" alt="Brand">
                            </a>
                        </div>
                        <div class="fricke brand">
                            <a href="https://www.fricke.de/">
                                <img src="media/fricke_logo.BxfcmfTT.webp" loading="lazy" style="width: 120px;" alt="Brand">
                            </a>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </section>
</body>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="src/js/reset.js"></script>
<script src="src/js/addSpace.js"></script>
<script src="src/js/addUppercase.js"></script>
<script src="src/js/form.js"></script>
</html>
